[build]
  command   = "npm run build"
  publish   = "dist"

# Supabase anon key and URL are intentionally public (client-side) values
# protected by Row Level Security — not real secrets, safe to be in bundle.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_PUBLIC_SUPABASE_ANON_KEY,VITE_PUBLIC_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL"

# SPA routing — send all paths to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Fix MIME type for ES module workers (.mjs) used by pdfjs-dist
# Without this Netlify sends application/octet-stream and the browser
# refuses to load the script as a module (strict MIME checking).
[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/assets/*.mjs"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
